<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>soundPlay</title>
  <link rel="stylesheet" href="event.css">
  <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
  <body>
    <div id="navbar"></div>

    <div class="title">Welcome to the Events soundPlay</div>
    <div class="desc">
      Explore a diverse collection of songs, discover your favorite artists, and
      shop for the latest albums and merchandise.
    </div>

    <div class="cardContainer">
      <div class="carde">
        <img src="assets/The Weeknd.jpg" alt="Picture" class="card-image" />
        <div class="card-content">
          <h2>The weekend</h2>
          <p>
            May 14, 2025</p>
          <div class="counter">
            <button class="decrease">-</button>
            <span class="count">0</span>
            <button class="increase">+</button>
            
            <i class="fa-solid fa-ticket icon"></i>
            <div class="added hidden"></div>
          </div>
        </div>
      </div>

      <div class="carde">
        <img src="assets/harry.jpg" alt="Picture" class="card-image" />
        <div class="card-content">
          <h2>Harry Styles</h2>
          <p>
            Sep 24, 2025</p>
          <div class="counter">
            <button class="decrease">-</button>
            <span class="count">0</span>
            <button class="increase">+</button>
            <i class="fa-solid fa-ticket icon"></i>
            <div class="added hidden"></div>
          </div>
        </div>
      </div>
      <div class="carde">
        <img src="assets/post.jpg" alt="Picture" class="card-image" />
        <div class="card-content">
          <h2>Post Malone</h2>
          <p>Nov 02, 2025</p>
          <div class="counter">
            <button class="decrease">-</button>
            <span class="count">0</span>
            <button class="increase">+</button>
            <i class="fa-solid fa-ticket icon"></i>
            <div class="added hidden"></div>
          </div>
        </div>
      </div>
      

    </div>
    <script src="event.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="layout.js"></script>
    <div id="footer"></div>
</body>
</html>
